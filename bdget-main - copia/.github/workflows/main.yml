name: Build and Push Docker Image 

on: 
  push:
    branches:
      - main   
  pull_request:
    branches:
      - main

jobs:
  # --- PASO DEL PDF: Análisis de Seguridad con Snyk ---
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Clona el repositorio
      
      - name: Install Snyk CLI
        run: npm install -g snyk # Instala la CLI de Snyk
      
      - name: Authenticate Snyk CLI
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} # Token guardado en GitHub Secrets
        run: snyk auth $SNYK_TOKEN
      
      - name: Snyk test Java dependencies
        run: snyk test --severity-threshold=high # Analiza vulnerabilidades de severidad alta o mayor
      
      - name: Generate Snyk JSON Report
        if: always()
        run: |
          echo "Generando reporte JSON de Snyk..."
          snyk test --json > snyk-report.json || echo "Falló snyk test, pero se continúa"
          ls -lh snyk-report.json || echo "No se generó el reporte"
      
      - name: Upload Snyk JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json

  # --- PASO DEL PDF: Análisis con SonarCloud ---
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: snyk-scan # Solo se ejecuta si pasó el escaneo de Snyk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2
            
      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # Token SonarCloud desde Secrets
        run: |
          mvn verify sonar:sonar \
          -Dsonar.projectKey=TU_PROJECTKEY_AQUI \
          -Dsonar.organization=TU_ORGANIZACION_AQUI \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${SONAR_TOKEN}

  # --- TU PASO ORIGINAL: Construir, hacer Push y Desplegar ---
  build:
    runs-on: ubuntu-latest
    needs: sonar-analysis # Solo se ejecuta si pasaron los tests de SonarCloud y Snyk
    steps:
      # Paso 1: Checkout del repositorio 
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 1.5: carga secretos en el application.properties
      - name: Update db url
        run: |
         db_url_escaped=$(printf '%s\n' "${{ secrets.DB_URL }}" | sed 's/[&/\]/\\&/g')
         sed -i "s|<db_url>|$db_url_escaped|" src/main/resources/application.properties
        shell: bash
        
      - name: Update db username 
        run: |
         db_username_escaped=$(printf '%s\n' "${{ secrets.DB_USERNAME }}" | sed 's/[&/\]/\\&/g')
         sed -i "s|<db_username>|$db_username_escaped|" src/main/resources/application.properties
        shell: bash
        
      - name: Update db password 
        run: |
         db_password_escaped=$(printf '%s\n' "${{ secrets.DB_PASSWORD }}" | sed 's/[&/\]/\\&/g')
         sed -i "s|<db_password>|$db_password_escaped|" src/main/resources/application.properties
        shell: bash

      # Paso 2: Autenticar en DockerHub 
      - name: Log in to DockerHub
        uses: docker/login-action@v2 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          
      # Paso 5: Configurar credenciales de AWS para SSH
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 5.5:  
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 6: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticar en DockerHub desde EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            # Descargar la última versión de la imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            # Parar y eliminar cualquier contenedor previo
            docker stop my-app || true && docker rm my-app || true
            # Iniciar el contenedor
            docker run -d --name my-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF